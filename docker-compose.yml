services:
  techniqsBurn-backend:
    image: postgres:16-alpine
    container_name: techniqsBurn-backend
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: techniqs_burn
    volumes:
      - techniqs_burn_data:/var/lib/postgresql/data

volumes:
  techniqs_burn_data:
